<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>isEqual 性能基准测试报告</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          'Helvetica Neue', Arial, sans-serif;
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
        background-color: #ffffff;
      }
      .container {
        background-color: white;
        padding: 20px;
        margin-bottom: 20px;
      }
      h1 {
        color: #2c3e50;
        text-align: center;
        margin-bottom: 30px;
        font-size: 24px;
      }
      .chart-container {
        margin: 20px 0;
        height: 400px;
      }
      .summary {
        margin: 20px 0;
        padding: 15px;
        background-color: #f8f9fa;
        border-radius: 4px;
        line-height: 1.6;
      }
      .findings {
        margin-top: 30px;
        padding: 20px;
        background-color: #f8f9fa;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>isEqual 性能基准测试报告</h1>

      <div class="chart-container">
        <canvas id="performanceChart"></canvas>
      </div>

      <div class="findings">
        <h3>性能分析发现 📝</h3>
        <ul>
          <li>
            原始类型比较：lodash/isEqual 性能最优，每秒处理约 1420 万次操作
          </li>
          <li>
            日期类型比较：es-toolkit/isEqual 表现最佳，每秒处理约 105 万次操作
          </li>
          <li>
            正则表达式：es-toolkit 系列性能领先，每秒可处理约 270 万次比较
          </li>
          <li>对象比较：react-fast-compare 效率最高，约为其他实现的 2.5 倍</li>
          <li>数组比较：lodash/isEqual 略胜一筹，每秒可处理约 180 万次操作</li>
        </ul>
      </div>
    </div>

    <script type="module">
      // import benchmarkResults from 'benchmark-results'
      // console.log(benchmarkResults)

      const ctx = document.getElementById('performanceChart')

      // 格式化大数字，将数字转换为更易读的形式（百万）
      const formatNumber = num => {
        return (num / 1000000).toFixed(2)
      }

      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ['原始类型', '日期类型', '正则表达式', '对象', '数组'],
          datasets: [
            {
              label: 'es-toolkit/isEqual',
              data: [5.01, 1.05, 2.64, 0.3, 1.22].map(x => x),
              backgroundColor: 'rgba(66, 133, 244, 0.5)',
              borderColor: 'rgba(66, 133, 244, 0.8)',
              borderWidth: 1,
              // borderSkipped: false, // 确保所有边都有圆角
            },
            {
              label: 'es-toolkit/compat/isEqual',
              data: [6.76, 0.92, 2.77, 0.29, 1.26].map(x => x),
              backgroundColor: 'rgba(15, 157, 88, 0.5)',
              borderColor: 'rgba(15, 157, 88, 0.8)',
              borderWidth: 1,
            },
            {
              label: 'lodash/isEqual',
              data: [14.2, 0.67, 0.49, 0.29, 1.81].map(x => x),
              backgroundColor: 'rgba(244, 180, 0, 0.5)',
              borderColor: 'rgba(244, 180, 0, 0.8)',
              borderWidth: 1,
            },
            {
              label: 'react-fast-compare',
              data: [0.81, 0.5, 1.69, 0.78, 1.68].map(x => x),
              backgroundColor: 'rgba(219, 68, 55, 0.8)',
              borderColor: 'rgba(219, 68, 55, 1)',
              borderWidth: 1,
            },
          ],
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'top',
              labels: {
                padding: 20,
                usePointStyle: true, // 使用点状样式的图例标记
                pointStyle: 'rectRounded', // 使用圆角矩形作为图例标记
              },
            },
            title: {
              display: true,
              text: '不同实现在各数据类型下的性能对比（百万次操作/秒）',
              padding: {
                bottom: 30,
              },
            },
          },
          scales: {
            x: {
              beginAtZero: true,
              title: {
                display: true,
                text: '每秒执行次数（百万）',
                padding: {
                  top: 20,
                },
              },
              grid: {
                display: true,
                drawBorder: false,
              },
            },
            y: {
              grid: {
                display: false,
              },
            },
          },
          layout: {
            padding: {
              right: 20,
            },
          },
          barPercentage: 0.8, // 控制条形图组的整体宽度（相对于可用空间）
          categoryPercentage: 0.9, // 控制类别组内条形图的宽度
          borderRadius: 2, // 统一设置所有条形图的圆角
        },
      })
    </script>
  </body>
</html>
